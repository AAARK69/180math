<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Evaluation | 180 Math</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --scroll: 0px; }
        html { scroll-behavior: smooth; background-color: #0B0B33; color: #E5BE85; font-family: system-ui, -apple-system, sans-serif; }
        body { background-color: #0B0B33; }

        .cinematic-noise { position: fixed; inset: 0; z-index: 9999; pointer-events: none; opacity: 0.05; mix-blend-mode: overlay; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); }
        .global-light { position: fixed; top: -20vh; left: -20vw; width: 80vw; height: 80vh; background: radial-gradient(circle at center, rgba(229, 190, 133, 0.08) 0%, transparent 70%); z-index: -3; pointer-events: none; }
        .bg-grid { position: fixed; inset: -50vh -50vw; z-index: -4; background-color: #0B0B33; background-image: linear-gradient(to right, rgba(229, 190, 133, 0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(229, 190, 133, 0.03) 1px, transparent 1px); background-size: 50px 50px; transform: translateY(calc(var(--scroll) * 0.15)); }

        .perspective-container { perspective: 1200px; }
        .spotlight-card { position: relative; background: linear-gradient(135deg, rgba(11, 11, 51, 0.9) 0%, rgba(11, 11, 51, 0.6) 100%); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-top: 1px solid rgba(229, 190, 133, 0.15); border-left: 1px solid rgba(229, 190, 133, 0.1); border-bottom: 1px solid rgba(0, 0, 0, 0.5); border-right: 1px solid rgba(0, 0, 0, 0.5); box-shadow: 20px 30px 60px rgba(0, 0, 0, 0.4), -5px -5px 20px rgba(229, 190, 133, 0.03); transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.4s ease; transform-style: preserve-3d; border-radius: 1.5rem; will-change: transform; }
        .spotlight-card > * { transform: translateZ(30px); }
        .spotlight-card::after { content: ""; position: absolute; inset: 0; z-index: -1; pointer-events: none; background: radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(229, 190, 133, 0.15), transparent 40%); transition: opacity 0.3s; opacity: 0; border-radius: inherit; }
        .spotlight-card:hover::after { opacity: 1; }
        .spotlight-card:hover { box-shadow: 30px 40px 70px rgba(0, 0, 0, 0.6), -5px -5px 25px rgba(229, 190, 133, 0.15); z-index: 20; }

        .btn-glow { position: relative; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 10px 20px rgba(0,0,0,0.4); transform: translateZ(50px); }
        .btn-glow:hover { box-shadow: 0 15px 30px rgba(229, 190, 133, 0.4), 0 5px 15px rgba(0,0,0,0.5); transform: translateY(-8px) translateZ(50px); }
        .link-hover { transition: color .2s ease, text-shadow .2s ease; }
        .link-hover:hover { color: #ffffff; text-shadow: 0 0 12px rgba(229,190,133,.6); }

        .reveal { opacity: 0; transform: translateY(40px) translateZ(-50px); transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); will-change: transform, opacity; }
        .reveal.active { opacity: 1; transform: translateY(0) translateZ(0); }

        .option-label { cursor: pointer; transition: all 0.2s; }
        .option-label:hover { background-color: rgba(229, 190, 133, 0.1); }
        input[type="radio"]:checked + .option-label { background-color: rgba(229, 190, 133, 0.2); border-color: #E5BE85; box-shadow: 0 0 10px rgba(229, 190, 133, 0.2); }
    </style>
</head>
<body class="font-[system-ui] relative overflow-x-hidden flex flex-col min-h-screen">

    <canvas id="math-physics" class="fixed inset-0 z-[0] pointer-events-none opacity-90"></canvas>
    <div class="cinematic-noise"></div>
    <div class="global-light"></div>
    <div class="bg-grid"></div>

    <nav class="bg-[#0B0B33]/80 backdrop-blur-2xl shadow-[0_10px_30px_rgba(0,0,0,0.5)] fixed w-full z-50 top-0 border-b border-[#E5BE85]/10">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center transform translateZ(0)">
            <a href="index.html" class="flex items-center"><img src="logo.png" alt="180 Math Logo" class="h-10 w-auto drop-shadow-md"></a>
            <div class="hidden md:flex space-x-8 text-xs uppercase tracking-widest font-bold">
                <a href="index.html" class="text-[#E5BE85]/80 hover:text-white transition-colors link-hover">&larr; Back to Home</a>
            </div>
        </div>
    </nav>

    <section class="flex-grow pt-40 pb-24 px-6 relative z-10 perspective-container flex flex-col justify-center items-center">
        <div class="max-w-4xl w-full" id="quiz-container">
            <div class="text-center mb-12 reveal active">
                <h1 class="text-5xl font-black text-[#E5BE85] mb-6 tracking-tighter decipher-text drop-shadow-lg">Placement Evaluation</h1>
                <p class="text-lg text-[#E5BE85]/80 leading-relaxed font-light tracking-wide drop-shadow-md">Select your tier to begin the diagnostic test.</p>
            </div>

            <!-- Tier Selection -->
            <div id="tier-selection" class="grid md:grid-cols-3 gap-8 reveal active">
                <button onclick="startQuiz('elementary')" class="spotlight-card p-10 text-center btn-glow">
                    <h3 class="text-2xl font-bold text-[#E5BE85] mb-4">Elementary</h3>
                    <p class="text-[#E5BE85]/80 text-sm font-light">Grades 3-5</p>
                </button>
                <button onclick="startQuiz('middle')" class="spotlight-card p-10 text-center btn-glow">
                    <h3 class="text-2xl font-bold text-[#E5BE85] mb-4">Middle School</h3>
                    <p class="text-[#E5BE85]/80 text-sm font-light">Grades 6-8</p>
                </button>
                <button onclick="startQuiz('high')" class="spotlight-card p-10 text-center btn-glow">
                    <h3 class="text-2xl font-bold text-[#E5BE85] mb-4">High School / SAT</h3>
                    <p class="text-[#E5BE85]/80 text-sm font-light">Grades 9-12</p>
                </button>
            </div>

            <!-- Question View -->
            <div id="question-view" class="spotlight-card p-10 hidden reveal active">
                <div class="transform translateZ(20px)">
                    <div class="flex justify-between items-center mb-8 border-b border-[#E5BE85]/20 pb-4">
                        <span id="tier-badge" class="text-xs font-bold text-[#E5BE85] uppercase tracking-widest bg-[#E5BE85]/10 px-3 py-1 rounded-full"></span>
                        <span id="question-counter" class="text-sm font-bold text-[#E5BE85]/80">Question 1 of 5</span>
                    </div>
                    <h2 id="question-text" class="text-2xl font-bold text-white mb-8 leading-relaxed"></h2>
                    <div id="options-container" class="space-y-4"></div>
                    <button id="next-btn" onclick="nextQuestion()" class="w-full mt-8 bg-[#E5BE85]/20 text-[#E5BE85] border border-[#E5BE85]/40 py-4 rounded-xl font-bold uppercase tracking-wider text-sm hover:bg-[#E5BE85] hover:text-[#0B0B33] transition-all hidden">Next Question</button>
                </div>
            </div>

            <!-- Results View -->
            <div id="results-view" class="hidden reveal active space-y-8">
                <div class="spotlight-card p-12 text-center">
                    <div class="transform translateZ(30px)">
                        <h2 class="text-4xl font-black text-[#E5BE85] mb-4">Diagnostic Report</h2>
                        <div class="text-6xl font-black text-white mb-6 drop-shadow-lg" id="score-display"></div>
                        <p id="score-message" class="text-xl text-[#E5BE85]/80 font-light mb-8"></p>
                        <div id="cta-container"></div>
                    </div>
                </div>
                <div id="breakdown-container" class="space-y-6"></div>
            </div>
        </div>
    </section>

    <footer class="bg-[#04060e] text-[#E5BE85]/50 py-16 text-center border-t border-[#E5BE85]/10 mt-auto relative z-10">
        <p class="tracking-widest uppercase text-xs font-bold">&copy; 2026 180 Math. All rights reserved.</p>
    </footer>

    <script src="main.js"></script>
    <script>
        const quizData = {
            elementary: [
                { q: "What is 7 × 8?", options: ["54", "56", "64", "49"], answer: 1, breakdown: "Multiplication principles: 7 groups of 8 equals 56. If you chose 54, you might have confused it with 6 × 9." },
                { q: "What is 125 + 387?", options: ["512", "502", "412", "522"], answer: 0, breakdown: "Addition with carrying: Remember to carry over the 1 when adding 5 + 7 = 12." },
                { q: "What is the perimeter of a rectangle with length 6 and width 4?", options: ["24", "10", "20", "16"], answer: 2, breakdown: "Perimeter formula: P = 2(l + w). 2(6 + 4) = 2(10) = 20. 24 is the area (6 × 4)." },
                { q: "What fraction is equivalent to 1/2?", options: ["2/3", "3/6", "4/10", "1/4"], answer: 1, breakdown: "Equivalent fractions: Multiplying the numerator and denominator by the same number (3/3) yields 3/6." },
                { q: "If a pizza is cut into 8 equal slices and you eat 3, what fraction of the pizza is left?", options: ["3/8", "5/8", "1/8", "8/5"], answer: 1, breakdown: "Subtraction of fractions: 8/8 - 3/8 = 5/8." }
            ],
            middle: [
                { q: "Solve for x: 3x - 7 = 14", options: ["x = 7", "x = 6", "x = 21", "x = 9"], answer: 0, breakdown: "Algebraic equations: Add 7 to both sides (3x = 21), then divide by 3." },
                { q: "What is 20% of 85?", options: ["17", "15", "18", "20"], answer: 0, breakdown: "Percentages: 20% is 1/5. 85 / 5 = 17." },
                { q: "Simplify: (4^3) / (4^2)", options: ["1", "4", "16", "64"], answer: 1, breakdown: "Exponent rules: When dividing terms with the same base, subtract the exponents. 3 - 2 = 1, so 4^1 = 4." },
                { q: "What is the area of a circle with radius 3? (Use π ≈ 3.14)", options: ["9.42", "28.26", "18.84", "12.56"], answer: 1, breakdown: "Area of a circle: A = πr². A = 3.14 × (3^2) = 3.14 × 9 = 28.26." },
                { q: "If y = 2x + 5, what is the value of y when x = -3?", options: ["-1", "1", "11", "-11"], answer: 0, breakdown: "Substituting values: y = 2(-3) + 5 = -6 + 5 = -1." }
            ],
            high: [
                { q: "Factor completely: x² - 9x + 20", options: ["(x-4)(x+5)", "(x-4)(x-5)", "(x+4)(x+5)", "(x-2)(x-10)"], answer: 1, breakdown: "Factoring quadratics: Find two numbers that multiply to 20 and add to -9. Those are -4 and -5." },
                { q: "Solve the system: y = 2x - 1 and y = x + 3", options: ["(4, 7)", "(2, 3)", "(3, 5)", "(4, 5)"], answer: 0, breakdown: "Systems of equations: Set 2x - 1 = x + 3. Subtract x: x - 1 = 3. Add 1: x = 4. Plug back in: y = 4 + 3 = 7." },
                { q: "What is the sine of 30 degrees?", options: ["1", "√3/2", "1/2", "√2/2"], answer: 2, breakdown: "Trigonometry: In a 30-60-90 triangle or on the unit circle, sin(30°) = 1/2." },
                { q: "Simplify: √(72)", options: ["6√2", "2√6", "36", "8"], answer: 0, breakdown: "Simplifying radicals: Find the largest perfect square factor. 72 = 36 × 2. √36 × √2 = 6√2." },
                { q: "Find the vertex of the parabola y = x² - 6x + 8", options: ["(3, -1)", "(-3, 17)", "(3, 8)", "(6, 8)"], answer: 0, breakdown: "Vertex formula: x = -b/(2a). x = -(-6)/(2×1) = 3. Plug in 3: y = 9 - 18 + 8 = -1." }
            ]
        };

        let currentTier = '';
        let currentQuestionIndex = 0;
        let score = 0;
        let incorrectAnswers = [];

        function startQuiz(tier) {
            currentTier = tier;
            currentQuestionIndex = 0;
            score = 0;
            incorrectAnswers = [];

            document.getElementById('tier-selection').classList.add('hidden');
            document.getElementById('question-view').classList.remove('hidden');
            document.getElementById('tier-badge').innerText = tier === 'high' ? 'High School / SAT' : tier.charAt(0).toUpperCase() + tier.slice(1);

            loadQuestion();
        }

        function loadQuestion() {
            const questionData = quizData[currentTier][currentQuestionIndex];
            document.getElementById('question-counter').innerText = `Question ${currentQuestionIndex + 1} of ${quizData[currentTier].length}`;
            document.getElementById('question-text').innerText = questionData.q;

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            questionData.options.forEach((opt, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'relative';

                const input = document.createElement('input');
                input.type = 'radio';
                input.name = 'answer';
                input.id = `opt${index}`;
                input.value = index;
                input.className = 'peer sr-only';
                input.onchange = enableNext;

                const label = document.createElement('label');
                label.htmlFor = `opt${index}`;
                label.className = 'option-label block w-full p-5 border border-[#E5BE85]/20 rounded-xl text-[#E5BE85]/90 font-medium';

                const span = document.createElement('span');
                span.className = 'mr-3 font-bold text-[#E5BE85]';
                span.textContent = `${String.fromCharCode(65 + index)}.`;

                label.appendChild(span);
                label.appendChild(document.createTextNode(` ${opt}`));

                wrapper.appendChild(input);
                wrapper.appendChild(label);
                optionsContainer.appendChild(wrapper);
            });

            document.getElementById('next-btn').classList.add('hidden');

            // Re-trigger reveal animation for options
            setTimeout(() => {
                if (typeof window.updateRects === 'function') window.updateRects();
            }, 100);
        }

        function enableNext() {
            const btn = document.getElementById('next-btn');
            btn.classList.remove('hidden');
            btn.innerText = currentQuestionIndex === quizData[currentTier].length - 1 ? 'Submit Test' : 'Next Question';
        }

        function nextQuestion() {
            const selected = document.querySelector('input[name="answer"]:checked');
            if (!selected) return;

            const ansIndex = parseInt(selected.value);
            const questionData = quizData[currentTier][currentQuestionIndex];

            if (ansIndex === questionData.answer) {
                score++;
            } else {
                incorrectAnswers.push({
                    q: questionData.q,
                    studentAns: questionData.options[ansIndex],
                    correctAns: questionData.options[questionData.answer],
                    breakdown: questionData.breakdown
                });
            }

            currentQuestionIndex++;
            if (currentQuestionIndex < quizData[currentTier].length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('question-view').classList.add('hidden');
            document.getElementById('results-view').classList.remove('hidden');

            const percentage = Math.round((score / quizData[currentTier].length) * 100);
            document.getElementById('score-display').innerText = `${percentage}%`;

            let message = '';
            let ctaHTML = '';

            const pricingLinks = {
                elementary: 'pricing.html#group',
                middle: 'pricing.html#group',
                high: 'pricing.html#group' // Assuming SAT or High School cohort
            };

            if (percentage >= 80) {
                message = "Excellent work! You have a strong foundational understanding.";
                const ctaBtn = document.createElement('a');
                ctaBtn.href = "contact.html";
                ctaBtn.className = "inline-block bg-[#E5BE85]/10 border border-[#E5BE85]/40 text-[#E5BE85] font-bold py-3 px-8 rounded-xl hover:bg-[#E5BE85] hover:text-[#0B0B33] transition-all btn-glow shadow-md";
                ctaBtn.textContent = "Join an Advanced Cohort";
                document.getElementById('cta-container').innerHTML = '';
                document.getElementById('cta-container').appendChild(ctaBtn);
            } else {
                message = "We identified some key areas where you can improve your understanding.";
                const wrapper = document.createElement('div');
                wrapper.className = "mt-6 border-t border-[#E5BE85]/20 pt-6";

                const label = document.createElement('p');
                label.className = "text-xs uppercase tracking-widest text-[#E5BE85]/60 mb-4 font-bold";
                label.textContent = "Recommended Action";

                const ctaBtn = document.createElement('a');
                ctaBtn.href = pricingLinks[currentTier];
                ctaBtn.className = "inline-block bg-gradient-to-r from-[#E5BE85] to-[#c79a55] text-[#0B0B33] font-black uppercase tracking-wider py-4 px-10 rounded-xl btn-glow shadow-[0_0_20px_rgba(229,190,133,0.4)]";
                ctaBtn.textContent = `Enroll in our ${currentTier.charAt(0).toUpperCase() + currentTier.slice(1)} Program`;

                wrapper.appendChild(label);
                wrapper.appendChild(ctaBtn);
                document.getElementById('cta-container').innerHTML = '';
                document.getElementById('cta-container').appendChild(wrapper);
            }

            document.getElementById('score-message').innerText = message;

            const breakdownContainer = document.getElementById('breakdown-container');
            breakdownContainer.innerHTML = '';

            if (incorrectAnswers.length > 0) {
                const header = document.createElement('h3');
                header.className = 'text-2xl font-bold text-[#E5BE85] mb-6 tracking-wide drop-shadow-md text-center mt-12';
                header.innerText = 'Conceptual Breakdown';
                breakdownContainer.appendChild(header);

                incorrectAnswers.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'spotlight-card p-8 text-left border-[#E5BE85]/20';

                    const inner = document.createElement('div');
                    inner.className = 'transform translateZ(20px)';

                    const questionP = document.createElement('p');
                    questionP.className = 'font-bold text-white mb-4';
                    questionP.textContent = item.q;

                    const flexDiv = document.createElement('div');
                    flexDiv.className = 'flex flex-col sm:flex-row gap-4 mb-4 text-sm';

                    const createAnsBox = (title, content, bgColorClass, borderClass, textClass) => {
                        const box = document.createElement('div');
                        box.className = `${bgColorClass} border ${borderClass} px-4 py-2 rounded-lg ${textClass}`;
                        const boxTitle = document.createElement('span');
                        boxTitle.className = 'font-bold block text-[10px] uppercase tracking-widest opacity-70 mb-1';
                        boxTitle.textContent = title;
                        box.appendChild(boxTitle);
                        box.appendChild(document.createTextNode(content));
                        return box;
                    };

                    const studentAnsBox = createAnsBox('Your Answer', item.studentAns, 'bg-red-900/30', 'border-red-500/30', 'text-red-200');
                    const correctAnsBox = createAnsBox('Correct Answer', item.correctAns, 'bg-green-900/30', 'border-green-500/30', 'text-green-200');

                    flexDiv.appendChild(studentAnsBox);
                    flexDiv.appendChild(correctAnsBox);

                    const explanationP = document.createElement('p');
                    explanationP.className = 'text-[#E5BE85]/90 leading-relaxed font-light mt-4 pt-4 border-t border-[#E5BE85]/10';
                    const expTitle = document.createElement('span');
                    expTitle.className = 'font-bold uppercase tracking-widest text-[10px] block mb-2 text-[#E5BE85]/50';
                    expTitle.textContent = 'Explanation';
                    explanationP.appendChild(expTitle);
                    explanationP.appendChild(document.createTextNode(item.breakdown));

                    inner.appendChild(questionP);
                    inner.appendChild(flexDiv);
                    inner.appendChild(explanationP);
                    card.appendChild(inner);
                    breakdownContainer.appendChild(card);
                });
            }

            // Re-bind mouse events to new spotlight cards
            setTimeout(() => {
                if (typeof window.updateRects === 'function') {
                    const newCards = Array.from(document.querySelectorAll("#results-view .spotlight-card"));
                    newCards.forEach(card => {
                        if(!window.cards.includes(card)) {
                            window.cards.push(card);
                            window.resizeObserver.observe(card);
                            card.addEventListener('mousemove', e => {
                                const rect = card._cachedRect;
                                if (!rect) return;
                                const x = e.clientX - rect.left;
                                const y = e.clientY - rect.top;
                                card.style.setProperty("--mouse-x", `${x}px`);
                                card.style.setProperty("--mouse-y", `${y}px`);
                                const xc = rect.width / 2;
                                const yc = rect.height / 2;
                                const dx = x - xc;
                                const dy = y - yc;
                                card.style.transform = `rotateY(${dx / 40}deg) rotateX(${-dy / 40}deg) scale3d(1.02, 1.02, 1.02)`;
                            }, { passive: true });

                            card.addEventListener('mouseleave', () => {
                                card.style.transform = `rotateY(0deg) rotateX(0deg) scale3d(1, 1, 1)`;
                            }, { passive: true });
                        }
                    });
                    window.updateRects();
                }
            }, 100);
        }
    </script>
</body>
</html>
