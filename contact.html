<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | 180 Math</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --scroll: 0px; }
        html { scroll-behavior: smooth; background-color: #070b19; }

        /* Cinematic Noise Overlay */
        .cinematic-noise { position: fixed; inset: 0; z-index: 9999; pointer-events: none; opacity: 0.05; mix-blend-mode: overlay; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); }
        /* Global Lighting */
        .global-light { position: fixed; top: -20vh; left: -20vw; width: 80vw; height: 80vh; background: radial-gradient(circle at center, rgba(34, 211, 238, 0.12) 0%, transparent 70%); z-index: -3; pointer-events: none; }
        /* Deep Background Grid */
        .bg-grid { position: fixed; inset: -50vh -50vw; z-index: -4; background-image: linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px), linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px); background-size: 50px 50px; transform: translateY(calc(var(--scroll) * 0.15)); }
        /* Floating Parallax Props */
        .floating-prop { position: fixed; z-index: -3; color: rgba(255,255,255,0.03); font-weight: 900; pointer-events: none; }
        .prop-1 { top: 15%; left: 5%; font-size: 30rem; filter: blur(12px); transform: translateY(calc(var(--scroll) * 0.4)) rotate(15deg); }
        .prop-2 { top: 50%; right: -5%; font-size: 40rem; filter: blur(18px); transform: translateY(calc(var(--scroll) * 0.25)) rotate(-10deg); }
        .prop-3 { bottom: -10%; left: 20%; font-size: 25rem; filter: blur(8px); transform: translateY(calc(var(--scroll) * 0.5)) rotate(5deg); }

        /* Spotlight Border & 3D Tilt */
        .perspective-container { perspective: 1200px; }
        .spotlight-card {
            position: relative; background: linear-gradient(135deg, rgba(7, 11, 25, 0.9) 0%, rgba(7, 11, 25, 0.6) 100%); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.15); border-left: 1px solid rgba(255, 255, 255, 0.1); border-bottom: 1px solid rgba(0, 0, 0, 0.5); border-right: 1px solid rgba(0, 0, 0, 0.5);
            box-shadow: 20px 30px 60px rgba(0, 0, 0, 0.4), -5px -5px 20px rgba(34, 211, 238, 0.03); transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.4s ease; transform-style: preserve-3d; border-radius: 1.5rem;
        }
        .spotlight-card > * { transform: translateZ(30px); }
        .spotlight-card::after { content: ""; position: absolute; inset: 0; z-index: -1; pointer-events: none; background: radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(34, 211, 238, 0.15), transparent 40%); transition: opacity 0.3s; opacity: 0; border-radius: inherit; }
        .spotlight-card:hover::after { opacity: 1; }
        .spotlight-card:hover { box-shadow: 30px 40px 70px rgba(0, 0, 0, 0.6), -5px -5px 25px rgba(34, 211, 238, 0.1); z-index: 20; }

        /* Hover Physics & Focus */
        .btn-glow { position: relative; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 10px 20px rgba(0,0,0,0.4); transform: translateZ(50px); }
        .btn-glow:hover { box-shadow: 0 15px 30px rgba(34, 211, 238, 0.4), 0 5px 15px rgba(0,0,0,0.5); transform: translateY(-8px) translateZ(50px); }
        .link-hover { transition: color .2s ease, text-shadow .2s ease; }
        .link-hover:hover { color: #22d3ee; text-shadow: 0 0 12px rgba(34,211,238,.6); }
        input:focus, select:focus, textarea:focus { box-shadow: 0 0 20px rgba(34, 211, 238, 0.15); border-color: #22d3ee !important; }

        /* Scroll Reveals */
        .reveal { opacity: 0; transform: translateY(40px) translateZ(-50px); transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.active { opacity: 1; transform: translateY(0) translateZ(0); }
    </style>
</head>
<body class="text-gray-200 font-sans relative overflow-x-hidden flex flex-col min-h-screen">

    <canvas id="math-physics" class="fixed inset-0 z-[-1] pointer-events-none opacity-80"></canvas>

    <div class="cinematic-noise"></div>
    <div class="global-light"></div>
    <div class="bg-grid"></div>
    <div class="floating-prop prop-1 font-serif">π</div>
    <div class="floating-prop prop-2 font-serif">∫</div>
    <div class="floating-prop prop-3 font-serif">∞</div>

    <nav class="bg-[#0C0B33]/70 backdrop-blur-2xl shadow-[0_10px_30px_rgba(0,0,0,0.5)] fixed w-full z-50 top-0 border-b border-white/10">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center transform translateZ(0)">
            <a href="index.html" class="flex items-center"><img src="logo.png" alt="180 Math Logo" class="h-10 w-auto brightness-110 drop-shadow-md"></a>
            <div class="hidden md:flex space-x-8 text-xs uppercase tracking-widest font-bold">
                <a href="pricing.html" class="text-cyan-100/70 hover:text-cyan-400 transition-colors link-hover">&larr; Back to Pricing</a>
            </div>
        </div>
    </nav>

    <section class="flex-grow pt-40 pb-24 px-6 relative z-10 perspective-container">
        <div class="max-w-3xl mx-auto">
            <div class="text-center mb-12 reveal active">
                <h1 class="text-5xl font-black text-white mb-6 tracking-tighter decipher-text drop-shadow-lg">Initialize Contact</h1>
                <p class="text-lg text-cyan-50/80 leading-relaxed font-light tracking-wide drop-shadow-md">Enter your parameters below to request pricing, join a waitlist, or submit a query. We will process your request within 24 hours.</p>
            </div>

            <div class="spotlight-card p-10 reveal active border-cyan-500/10">
                <form action="https://formspree.io/f/mojykkdn" method="POST" class="space-y-8 transform translateZ(20px)">
                    
                    <p class="text-xs uppercase tracking-widest text-gray-500 pb-4 border-b border-white/10 font-bold drop-shadow-sm"><span class="text-cyan-400 text-lg leading-none mr-1">*</span> Required Parameters</p>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="block text-xs uppercase tracking-widest font-bold text-gray-400 mb-3 drop-shadow-sm">Parent Name <span class="text-cyan-400">*</span></label>
                            <input type="text" name="Parent Name" required class="w-full bg-black/50 border border-white/10 rounded-xl px-5 py-4 text-white focus:outline-none transition-all shadow-inner">
                        </div>
                        <div>
                            <label class="block text-xs uppercase tracking-widest font-bold text-gray-400 mb-3 drop-shadow-sm">Student Name <span class="text-cyan-400">*</span></label>
                            <input type="text" name="Student Name" required class="w-full bg-black/50 border border-white/10 rounded-xl px-5 py-4 text-white focus:outline-none transition-all shadow-inner">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="block text-xs uppercase tracking-widest font-bold text-gray-400 mb-3 drop-shadow-sm">Email Address <span class="text-cyan-400">*</span></label>
                            <input type="email" name="Email" required class="w-full bg-black/50 border border-white/10 rounded-xl px-5 py-4 text-white focus:outline-none transition-all shadow-inner">
                        </div>
                        <div>
                            <label class="block text-xs uppercase tracking-widest font-bold text-gray-400 mb-3 drop-shadow-sm">Phone Number</label>
                            <input type="tel" name="Phone" class="w-full bg-black/50 border border-white/10 rounded-xl px-5 py-4 text-white focus:outline-none transition-all shadow-inner">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="block text-xs uppercase tracking-widest font-bold text-gray-400 mb-3 drop-shadow-sm">Student Grade Level <span class="text-cyan-400">*</span></label>
                            <select name="Grade Level" required class="w-full bg-black/50 border border-white/10 rounded-xl px-5 py-4 text-white focus:outline-none transition-all appearance-none cursor-pointer shadow-inner">
                                <option value="" disabled selected>Select a grade...</option>
                                <option value="Elementary">Elementary (Grades 3-5)</option>
                                <option value="Middle School">Middle School (Grades 6-8)</option>
                                <option value="High School">High School</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs uppercase tracking-widest font-bold text-gray-400 mb-3 drop-shadow-sm">Program of Interest <span class="text-cyan-400">*</span></label>
                            <select name="Program" required class="w-full bg-black/50 border border-white/10 rounded-xl px-5 py-4 text-white focus:outline-none transition-all appearance-none cursor-pointer shadow-inner">
                                <option value="" disabled selected>Select a program...</option>
                                <option value="Group Cohort">Group Cohort</option>
                                <option value="Private 1-on-1">Private 1-on-1 Tutoring</option>
                                <option value="SAT Prep - Short Term">SAT Prep - Short Term</option>
                                <option value="SAT Prep - Long Term">SAT Prep - Long Term</option>
                                <option value="General Question">Just a general question</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="block text-xs uppercase tracking-widest font-bold text-gray-400 mb-3 drop-shadow-sm">Preferred Mode of Contact</label>
                            <select name="Preferred Contact" class="w-full bg-black/50 border border-white/10 rounded-xl px-5 py-4 text-white focus:outline-none transition-all appearance-none cursor-pointer shadow-inner">
                                <option value="Email" selected>Email</option>
                                <option value="Phone">Phone</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs uppercase tracking-widest font-bold text-gray-400 mb-3 drop-shadow-sm">Message / Details</label>
                        <textarea name="Message" rows="5" class="w-full bg-black/50 border border-white/10 rounded-xl px-5 py-4 text-white focus:outline-none transition-all resize-y shadow-inner"></textarea>
                    </div>

                    <button type="submit" class="w-full bg-gradient-to-r from-[#0ea5e9] to-[#22d3ee] text-[#070b19] font-black text-sm uppercase tracking-widest py-5 rounded-xl btn-glow mt-8 shadow-[0_0_20px_rgba(34,211,238,0.3)]">
                        Transmit Data
                    </button>
                </form>
            </div>
        </div>
    </section>

    <footer class="bg-[#04060e] text-gray-600 py-16 text-center border-t border-white/5 mt-auto relative z-10">
        <p class="tracking-widest uppercase text-xs font-bold">&copy; 2026 180 Math. All rights reserved.</p>
    </footer>

    <script>
        window.addEventListener('scroll', () => { document.documentElement.style.setProperty('--scroll', window.scrollY + 'px'); });

        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789∫∑√∆∞≈";
        function scramble(el) {
            let iteration = 0; const originalText = el.innerText;
            const interval = setInterval(() => {
                el.innerText = el.innerText.split("").map((letter, index) => {
                    if(index < iteration) return originalText[index];
                    return letters[Math.floor(Math.random() * letters.length)];
                }).join("");
                if(iteration >= originalText.length) clearInterval(interval);
                iteration += 1 / 3;
            }, 30);
        }
        
        document.querySelectorAll(".spotlight-card").forEach(card => {
            card.onmousemove = e => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left; const y = e.clientY - rect.top;
                card.style.setProperty("--mouse-x", `${x}px`); card.style.setProperty("--mouse-y", `${y}px`);
                const xc = rect.width / 2; const yc = rect.height / 2;
                const dx = x - xc; const dy = y - yc;
                // Make the tilt extremely subtle on forms so it isn't distracting to type
                card.style.transform = `rotateY(${dx / 80}deg) rotateX(${-dy / 80}deg) scale3d(1.01, 1.01, 1.01)`;
            };
            card.onmouseleave = () => { card.style.transform = `rotateY(0deg) rotateX(0deg) scale3d(1, 1, 1)`; };
        });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                    if(entry.target.classList.contains('decipher-text')) { scramble(entry.target); entry.target.classList.remove('decipher-text'); }
                }
            });
        }, { threshold: 0.15 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        // Canvas Physics Engine
        const canvas = document.getElementById('math-physics');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [], cardRects = [];
        const symbols = ['∫','∑','√','∆','∞','≈','π','θ','Ω','α','β','γ','λ','μ','ρ','σ','φ','ω', 'x', 'y', '='];

        function resizeCanvas() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; updateRects(); }
        function updateRects() {
            cardRects = Array.from(document.querySelectorAll('.spotlight-card')).map(card => {
                const rect = card.getBoundingClientRect();
                return { top: rect.top + window.scrollY, bottom: rect.bottom + window.scrollY, left: rect.left, right: rect.right };
            });
        }
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('scroll', updateRects);
        
        class MathParticle {
            constructor() { this.spawn(true); }
            spawn(randomY = false) {
                const zone = width * 0.15;
                this.x = Math.random() > 0.5 ? Math.random() * zone : width - (Math.random() * zone);
                this.y = randomY ? Math.random() * (height + window.scrollY) : window.scrollY - 50 - Math.random() * 100;
                this.size = Math.random() * 14 + 10;
                this.symbol = symbols[Math.floor(Math.random() * symbols.length)];
                this.vx = (Math.random() - 0.5) * 1.5; 
                this.vy = Math.random() * 2 + 1; 
                this.gravity = 0.03 + Math.random() * 0.05; 
                this.elasticity = 0.4 + Math.random() * 0.3; 
                this.rot = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.05;
            }
            update() {
                this.vy += this.gravity; this.x += this.vx; this.y += this.vy; this.rot += this.rotSpeed;
                for (let i = 0; i < cardRects.length; i++) {
                    let rect = cardRects[i];
                    if (this.x > rect.left && this.x < rect.right && this.y + this.size > rect.top && this.y < rect.bottom) {
                        if (this.vy > 0) { this.y = rect.top - this.size; this.vy *= -this.elasticity; this.vx += (Math.random() - 0.5) * 2; this.rotSpeed += (Math.random() - 0.5) * 0.2; }
                    }
                }
                if (this.y > window.scrollY + height + 100 || this.x < -50 || this.x > width + 50) this.spawn();
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y - window.scrollY); ctx.rotate(this.rot);
                ctx.fillStyle = `rgba(34, 211, 238, ${this.size / 40})`; ctx.font = `${this.size}px monospace`;
                ctx.fillText(this.symbol, 0, 0); ctx.restore();
            }
        }
        resizeCanvas();
        for (let i = 0; i < 150; i++) particles.push(new MathParticle());
        function animate() { ctx.clearRect(0, 0, width, height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
