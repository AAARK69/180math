<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | 180 Math</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { scroll-behavior: smooth; }
        .bg-grid { background-color: #070b19; background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px); background-size: 30px 30px; }
        .btn-hover { transition: transform .15s ease, background .2s ease, box-shadow .2s ease; }
        .btn-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -10px rgba(34,211,238,.5); }
        .card-hover { transition: transform .3s ease, border-color .3s ease, box-shadow .3s ease, background .3s ease; }
        .card-hover:hover { transform: translateY(-4px); border-color: rgba(34,211,238,.4); box-shadow: 0 10px 30px -10px rgba(34,211,238,.15); background: rgba(255,255,255,.05); }
        .link-hover { transition: color .2s ease, text-shadow .2s ease; }
        .link-hover:hover { color: #22d3ee; text-shadow: 0 0 8px rgba(34,211,238,.4); }
        .reveal { opacity: 0; transform: translateY(40px); transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="bg-grid text-gray-200 font-sans flex flex-col min-h-screen relative overflow-x-hidden">

    <canvas id="tech-canvas" class="fixed inset-0 z-[-1] pointer-events-none"></canvas>

    <nav class="bg-[#0C0B33]/90 backdrop-blur-md shadow-md fixed w-full z-20 top-0 border-b border-white/5">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="flex items-center">
                <img src="logo.png" alt="180 Math Logo" class="h-12 w-auto">
            </a>
            <div class="hidden md:flex space-x-6">
                <a href="pricing.html" class="text-gray-300 font-semibold link-hover">&larr; Back to Pricing</a>
            </div>
        </div>
    </nav>

    <section class="flex-grow pt-32 pb-16 px-4 relative z-10">
        <div class="max-w-2xl mx-auto reveal active">
            <div class="text-center mb-10">
                <h1 class="text-4xl font-extrabold text-white mb-4 tracking-tight">Get in Touch</h1>
                <p class="text-lg text-gray-400 leading-relaxed">Fill out the form below to request pricing, join a waitlist, or ask a question. We will get back to you within 24 hours.</p>
            </div>

            <div class="bg-[#070b19]/90 border border-white/10 rounded-2xl p-8 shadow-xl card-hover">
                <form action="https://formspree.io/f/mojykkdn" method="POST" class="space-y-6">
                    <p class="text-sm text-gray-400 pb-3 border-b border-white/10"><span class="text-[#22d3ee] font-bold">*</span> Indicates a required field</p>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-gray-300 mb-2">Parent Name <span class="text-[#22d3ee]">*</span></label>
                            <input type="text" name="Parent Name" required class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#22d3ee] focus:bg-[#070b19] transition-colors">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-300 mb-2">Student Name <span class="text-[#22d3ee]">*</span></label>
                            <input type="text" name="Student Name" required class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#22d3ee] focus:bg-[#070b19] transition-colors">
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-gray-300 mb-2">Email Address <span class="text-[#22d3ee]">*</span></label>
                            <input type="email" name="Email" required class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#22d3ee] focus:bg-[#070b19] transition-colors">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-300 mb-2">Phone Number</label>
                            <input type="tel" name="Phone" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#22d3ee] focus:bg-[#070b19] transition-colors">
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-gray-300 mb-2">Student Grade Level <span class="text-[#22d3ee]">*</span></label>
                            <select name="Grade Level" required class="w-full bg-[#070b19] border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#22d3ee] transition-colors appearance-none">
                                <option value="" disabled selected>Select a grade...</option><option value="Elementary">Elementary (Grades 3-5)</option><option value="Middle School">Middle School (Grades 6-8)</option><option value="High School">High School</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-300 mb-2">Program of Interest <span class="text-[#22d3ee]">*</span></label>
                            <select name="Program" required class="w-full bg-[#070b19] border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#22d3ee] transition-colors appearance-none">
                                <option value="" disabled selected>Select a program...</option><option value="Group Cohort">Group Cohort</option><option value="Private 1-on-1">Private 1-on-1 Tutoring</option><option value="SAT Prep - Short Term">SAT Prep - Short Term</option><option value="SAT Prep - Long Term">SAT Prep - Long Term</option><option value="General Question">Just a general question</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-300 mb-2">Preferred Mode of Contact</label>
                        <select name="Preferred Contact" class="w-full bg-[#070b19] border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#22d3ee] transition-colors appearance-none">
                            <option value="Email" selected>Email</option><option value="Phone">Phone</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-300 mb-2">Message / Questions</label>
                        <textarea name="Message" rows="4" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#22d3ee] focus:bg-[#070b19] transition-colors"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-gradient-to-r from-[#0ea5e9] to-[#22d3ee] text-[#070b19] font-extrabold text-lg py-4 rounded-xl btn-hover mt-6">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <footer class="bg-white/[0.02] text-gray-500 py-10 text-center border-t border-white/5 mt-auto relative z-10 backdrop-blur-sm">
        <p>&copy; 2026 180 Math. All rights reserved.</p>
    </footer>

    <script>
        const observer = new IntersectionObserver((entries) => { entries.forEach(entry => { if (entry.isIntersecting) { entry.target.classList.add('active'); } }); }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        const canvas = document.getElementById('tech-canvas'); const ctx = canvas.getContext('2d'); let width, height; let particles = []; let mouse = { x: null, y: null, radius: 150 };
        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
        class Particle {
            constructor() { this.x = Math.random() * width; this.y = Math.random() * height; this.size = Math.random() * 2 + 0.5; this.baseX = this.x; this.baseY = this.y; this.density = (Math.random() * 30) + 1; }
            draw() { ctx.fillStyle = 'rgba(34, 211, 238, 0.5)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.closePath(); ctx.fill(); }
            update() {
                let dx = mouse.x - this.x; let dy = mouse.y - this.y; let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < mouse.radius) { this.x -= (dx / distance) * ((mouse.radius - distance) / mouse.radius) * this.density; this.y -= (dy / distance) * ((mouse.radius - distance) / mouse.radius) * this.density; } 
                else { if (this.x !== this.baseX) { this.x -= (this.x - this.baseX) / 20; } if (this.y !== this.baseY) { this.y -= (this.y - this.baseY) / 20; } }
            }
        }
        function init() { particles = []; let num = (width * height) / 9000; for (let i = 0; i < num; i++) { particles.push(new Particle()); } }
        function animate() {
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(); particles[i].draw();
                for (let j = i; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x; let dy = particles[i].y - particles[j].y; let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 100) { ctx.beginPath(); ctx.strokeStyle = `rgba(34, 211, 238, ${0.2 - distance/500})`; ctx.lineWidth = 1; ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke(); }
                }
            }
            requestAnimationFrame(animate);
        }
        init(); animate();
    </script>
</body>
</html>
