<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | 180 Math</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#070b19] text-gray-200 font-sans flex flex-col min-h-screen">

    <nav class="bg-[#0b1224] shadow-md w-full z-10 border-b border-[#1a264a]">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="flex items-center">
                <img src="logo.png" alt="180 Math Logo" class="h-14 w-auto">
            </a>
            <div class="hidden md:flex space-x-6">
                <a href="pricing.html" class="hover:text-[#d6b054] text-gray-300 transition font-semibold">&larr; Back to Pricing</a>
            </div>
        </div>
    </nav>

    <section class="flex-grow py-16 px-4">
        <div class="max-w-2xl mx-auto">
            <div class="text-center mb-10">
                <h1 class="text-4xl font-extrabold text-white mb-4">Get in Touch</h1>
                <p class="text-lg text-gray-400">Fill out the form below to request pricing, join a waitlist, or ask a question. We will get back to you within 24 hours.</p>
            </div>

            <div class="bg-[#0b1224] border border-[#1a264a] rounded-xl p-8 shadow-lg">
                <form action="https://formspree.io/f/mojykkdn" method="POST" class="space-y-6">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-gray-300 mb-2" for="parent_name">Parent Name</label>
                            <input type="text" id="parent_name" name="Parent Name" required class="w-full bg-[#111a30] border border-[#1a264a] rounded px-4 py-3 text-white focus:outline-none focus:border-[#d6b054] transition">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-300 mb-2" for="student_name">Student Name</label>
                            <input type="text" id="student_name" name="Student Name" required class="w-full bg-[#111a30] border border-[#1a264a] rounded px-4 py-3 text-white focus:outline-none focus:border-[#d6b054] transition">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-gray-300 mb-2" for="email">Email Address</label>
                            <input type="email" id="email" name="Email" required class="w-full bg-[#111a30] border border-[#1a264a] rounded px-4 py-3 text-white focus:outline-none focus:border-[#d6b054] transition">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-300 mb-2" for="phone">Phone Number</label>
                            <input type="tel" id="phone" name="Phone" class="w-full bg-[#111a30] border border-[#1a264a] rounded px-4 py-3 text-white focus:outline-none focus:border-[#d6b054] transition">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-gray-300 mb-2" for="grade">Student Grade Level</label>
                            <select id="grade" name="Grade Level" required class="w-full bg-[#111a30] border border-[#1a264a] rounded px-4 py-3 text-white focus:outline-none focus:border-[#d6b054] transition appearance-none">
                                <option value="" disabled selected>Select a grade...</option>
                                <option value="Elementary">Elementary (Grades 3-5)</option>
                                <option value="Middle School">Middle School (Grades 6-8)</option>
                                <option value="High School">High School</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-300 mb-2" for="program">Program of Interest</label>
                            <select id="program" name="Program" required class="w-full bg-[#111a30] border border-[#1a264a] rounded px-4 py-3 text-white focus:outline-none focus:border-[#d6b054] transition appearance-none">
                                <option value="" disabled selected>Select a program...</option>
                                <option value="Group Cohort">Group Cohort</option>
                                <option value="Private 1-on-1">Private 1-on-1 Tutoring</option>
                                <option value="SAT Prep - Short Term">SAT Prep - Short Term</option>
                                <option value="SAT Prep - Long Term">SAT Prep - Long Term</option>
                                <option value="General Question">Just a general question</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-300 mb-2" for="message">Message / Questions</label>
                        <textarea id="message" name="Message" rows="4" class="w-full bg-[#111a30] border border-[#1a264a] rounded px-4 py-3 text-white focus:outline-none focus:border-[#d6b054] transition"></textarea>
                    </div>

                    <button type="submit" class="w-full bg-[#d6b054] text-[#070b19] font-extrabold text-lg py-3 rounded hover:bg-[#be9b48] transition mt-4">
                        Send Message
                    </button>
                </form>
            </div>
        </div>
    </section>

    <footer class="bg-[#04060e] text-gray-500 py-8 text-center border-t border-[#1a264a]">
        <p>&copy; 2026 180 Math. All rights reserved.</p>
    </footer>

</body>
</html>
