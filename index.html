<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | 180 Math</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { scroll-behavior: smooth; }

        /* 1. Grainy Noise Overlay */
        .bg-grid::before {
            content: ""; position: fixed; inset: 0; z-index: 100; pointer-events: none;
            opacity: 0.04; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* 2. Twinkling Star Dots Layer */
        body::after {
            content: ""; position: fixed; inset: 0; z-index: -2; pointer-events: none; opacity: 0.35;
            background-image: radial-gradient(rgba(255,255,255,0.8) 1px, transparent 1px); background-size: 4px 4px;
            mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
            animation: twinkle 8s linear infinite;
        }
        @keyframes twinkle { 0% { opacity: 0.35; } 50% { opacity: 0.1; } 100% { opacity: 0.35; } }

        /* Space Grid Background */
        .bg-grid {
            background-color: #070b19;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Spotlight Border */
        .spotlight-card {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease-out;
            transform-style: preserve-3d;
            border-radius: 1.5rem;
        }
        .spotlight-card::before {
            content: ""; position: absolute; inset: -1px; z-index: -1;
            background: radial-gradient(400px circle at var(--mouse-x) var(--mouse-y), rgba(34, 211, 238, 0.3), transparent 40%);
            border-radius: inherit;
        }

        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s cubic-bezier(0.15, 1, 0.3, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .btn-glow { position: relative; transition: all 0.3s ease; }
        .btn-glow:hover { box-shadow: 0 0 25px rgba(34, 211, 238, 0.4); transform: translateY(-2px); }
        .link-hover { transition: color .2s ease, text-shadow .2s ease; }
        .link-hover:hover { color: #22d3ee; text-shadow: 0 0 8px rgba(34,211,238,.4); }
    </style>
</head>
<body class="bg-grid text-gray-200 font-sans flex flex-col min-h-screen relative overflow-x-hidden">

    <canvas id="tech-canvas" class="fixed inset-0 z-[-1] pointer-events-none opacity-50"></canvas>

    <nav class="bg-[#0C0B33]/80 backdrop-blur-xl shadow-lg fixed w-full z-50 top-0 border-b border-white/5">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center">
                <img src="logo.png" alt="180 Math Logo" class="h-10 w-auto brightness-110">
            </a>
            <div class="hidden md:flex space-x-8 text-xs uppercase tracking-widest font-bold">
                <a href="pricing.html" class="hover:text-cyan-400 transition-colors link-hover">&larr; Back to Pricing</a>
            </div>
        </div>
    </nav>

    <section class="flex-grow pt-40 pb-24 px-6 relative z-10">
        <div class="max-w-3xl mx-auto">
            <div class="text-center mb-12 reveal active">
                <h1 class="text-5xl font-black text-white mb-6 tracking-tighter">Initialize Contact</h1>
                <p class="text-lg text-cyan-100/60 leading-relaxed font-light tracking-wide">Enter your parameters below to request pricing or join a waitlist. Processed within 24 hours.</p>
            </div>

            <div class="spotlight-card p-10 shadow-2xl reveal active backdrop-blur-md border-cyan-500/10">
                <form action="https://formspree.io/f/mojykkdn" method="POST" class="space-y-8">
                    <p class="text-xs uppercase tracking-widest text-gray-500 pb-4 border-b border-white/10 font-bold"><span class="text-cyan-400 text-lg leading-none mr-1">*</span> Required Parameters</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div><label class="block text-xs uppercase tracking-widest font-bold text-gray-400 mb-3">Parent Name <span class="text-cyan-400">*</span></label><input type="text" name="Parent Name" required class="w-full bg-black/40 border border-white/10 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-cyan-400 transition-all"></div>
                        <div><label class="block text-xs uppercase tracking-widest font-bold text-gray-400 mb-3">Student Name <span class="text-cyan-400">*</span></label><input type="text" name="Student Name" required class="w-full bg-black/40 border border-white/10 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-cyan-400 transition-all"></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div><label class="block text-xs uppercase tracking-widest font-bold text-gray-400 mb-3">Email Address <span class="text-cyan-400">*</span></label><input type="email" name="Email" required class="w-full bg-black/40 border border-white/10 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-cyan-400 transition-all"></div>
                        <div><label class="block text-xs uppercase tracking-widest font-bold text-gray-400 mb-3">Phone Number</label><input type="tel" name="Phone" class="w-full bg-black/40 border border-white/10 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-cyan-400 transition-all"></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div><label class="block text-xs uppercase tracking-widest font-bold text-gray-400 mb-3">Student Grade <span class="text-cyan-400">*</span></label><select name="Grade Level" required class="w-full bg-black/40 border border-white/10 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-cyan-400 appearance-none cursor-pointer"><option value="" disabled selected>Select...</option><option>Elementary</option><option>Middle School</option><option>High School</option></select></div>
                        <div><label class="block text-xs uppercase tracking-widest font-bold text-gray-400 mb-3">Program <span class="text-cyan-400">*</span></label><select name="Program" required class="w-full bg-black/40 border border-white/10 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-cyan-400 appearance-none cursor-pointer"><option value="" disabled selected>Select...</option><option>Group Cohort</option><option>Private 1-on-1</option><option>SAT Prep</option></select></div>
                    </div>
                    <button type="submit" class="w-full bg-gradient-to-r from-[#0ea5e9] to-[#22d3ee] text-[#070b19] font-black text-sm uppercase tracking-widest py-5 rounded-xl btn-glow">Transmit Data</button>
                </form>
            </div>
        </div>
    </section>

    <footer class="bg-[#04060e] text-gray-600 py-12 text-center border-t border-white/5 mt-auto relative z-10">
        <p>&copy; 2026 180 Math. All rights reserved.</p>
    </footer>

    <script>
        document.querySelectorAll(".spotlight-card").forEach(card => {
            card.onmousemove = e => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left; const y = e.clientY - rect.top;
                card.style.setProperty("--mouse-x", `${x}px`); card.style.setProperty("--mouse-y", `${y}px`);
                const xc = rect.width / 2; const yc = rect.height / 2;
                const dx = x - xc; const dy = y - yc;
                card.style.transform = `rotateY(${dx / 60}deg) rotateX(${-dy / 60}deg) scale3d(1.01, 1.01, 1.01)`;
            };
            card.onmouseleave = () => { card.style.transform = `rotateY(0deg) rotateX(0deg) scale3d(1, 1, 1)`; };
        });
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        const canvas = document.getElementById('tech-canvas'); const ctx = canvas.getContext('2d');
        let width, height, particles = [];
        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Particle {
            constructor() {
                this.x = Math.random() * width; this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.4; this.vy = (Math.random() - 0.5) * 0.4;
            }
            update() { this.x += this.vx; this.y += this.vy; if(this.x<0 || this.x>width) this.vx*=-1; if(this.y<0 || this.y>height) this.vy*=-1; }
            draw() { ctx.fillStyle = 'rgba(34, 211, 238, 0.2)'; ctx.beginPath(); ctx.arc(this.x, this.y, 1.5, 0, Math.PI*2); ctx.fill(); }
        }
        for(let i=0; i<80; i++) particles.push(new Particle());
        function anim() { ctx.clearRect(0,0,width,height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(anim); }
        anim();
    </script>
</body>
</html>
